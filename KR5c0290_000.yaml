front:
  text: 三篇同卷清六
  hash: sha256:821f6b3af141512b2f47148ece8b0c80602ed4c0b35592216562cf644ffee48e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0290_HFL_000-001a, image: hfl/0587/0587-004.png}
body:
  text: 太上衛靈神化九轉丹砂法九轉靈砂大丹九轉青金靈砂丹太上衛靈神化九轉丹砂法第一轉化丹砂成水銀取光明砂一十六兩辰錦州出者良也黃礬十二兩用瓜州者右件藥二味先取黃礬炒過研成末布於爐子底次研朱砂末安在黃末向上以銀匕子均攤令得所了向上亦用黃礬末覆蓋之令厚二分却以一小瓶子蓋之後用六一泥固濟如法須令堅密勿使有泄氣之處候泥乾了擇日用子時鐡釘三箇安向上了然後下火𥘉先文火養之一日一夜訖後漸漸加武火燒之經兩日夜候藥爐通赤了便止火候藥爐子冷了細細開爐看之其朱砂盡化成水銀以物掃之收取如飛未盡者須再准前用黃礬末覆於爐子內如法固濟更加武火重飛之一兩日間以候飛盡水銀為度名曰河上姹女也參同契曰河上姹女靈而最神遇火即飛不染垢塵鬼隱龍匿莫知所存將欲制之黃芽為根此言水銀得金之精氣其萌芽漸漸生長矣第二轉將水銀却變成丹砂取前抽飛成水銀稱看每十兩用石亭脂三兩右二味先取石亭脂於新垍器中研如粉了却一時入鉎之中以炭火消鎔之候硫黃成汁然後細細將水銀投入硫黃汁內以鐡筯急攪之令得所其水銀與硫黃總結定成青砂子取出安爐內依前覆蓋定用六一泥如法固濟令牢密候其泥乾無泄氣處仍安於三箇釘上先下文火養一伏時却漸漸加武火燒之兩日夜訖候爐子冷開爐看之其水銀巳化成朱砂光明可愛參同契曰丹砂木精得金乃并言丹砂本是金體須得金養之積漸成形一云漸漸令堅硬也第三轉却化丹砂成水銀取前燒了丹砂爛研如粉所有方法一一並准前法以黃礬末上下蓋藉之如法固濟候六一泥乾如第一度法初用文火養一日夜後加武火飛之如經兩日夜爐冷開之看朱砂化成水銀細細取收之於別垍器中研如末化盡者即須依前法以黃礬末蓋之如法固濟再飛上一兩日夜以飛盡水銀為度名太陽流珠也參同契曰太陽流珠常欲去人若得金華轉而相親化為白液凝而至堅言流珠者三鍊水銀也此物無定性亦好飛走但得金華之氣即漸成形質也第四轉化太陽流珠為丹砂又煮金銀水法取一銀鍋子可受一斗水用上等金銀薄五十片常以水八九升用煮金銀薄七日夜勿令絶火煮日數足只常以水三升許煎之五日一度抽添以候日數足了取鍊了金銀水以垍瓶中貯之其用水制藥法取鍊了金銀水三升鹵鹹汁一小合大鵬砂一分曾青一分空青一分石膽一分礬石二分黃礬二分硝石一分巳上藥並須細細研如粉總將入金銀水中合煎其水常令魚眼沸晝夜令滿煮三七日訖候其流珠凝結如麵相似即得停火一時煎盡金銀水若乾涸時但續添水煎令日足以鐵匙漉取汞砂用帛綟出取凝者别置器中餘所綟出稀者即須准前更煮以流珠結盡為度參同契曰植禾當以粟覆雞用其卵又曰類同則相從事乖不成寶燕雀不生鳯狐兔不乳馬注言朱砂水銀本是金體必須藉金銀精氣然後成形質也第五轉入隂陽爐子令藥砂堅剛先泥一隂爐用坩土外泥之須令如法候極乾取前藥砂碎研在內用藥雄黃二分胡桐律三分大鵬砂三分曾青一分朴硝一分巳上藥六味總須細研內中即以金銀水和鹵鹹汁續添之以文武火煮常令魚眼沸如是煮之經七日夜滿停火漉出砂看之以絶堅硬為限然後將入神室內養之三百六十氣足自然伏火鼓鎔不折矣參同契曰物無隂陽違天背源雞子自卵其雛不全注言物無隂陽之氣配合運用無成須藉隂陽之氣而成形也第六轉變硬成伏火黃銀取前件藥砂於鐵臼中搗碎內入銀鍋中以雌黃二分鹽膽汁一升用玄明水五升合煮之二七日滿水涸即續續添之慢火煎之常令魚眼沸兼晝夜須看守之專候水銀砂微帶淺黃色為限約不得帶深黃色黃銀砂雖然堅實凝結未絶伏火宜入神室內如法固濟令密將於灰池中養之七日入坩堝消不折分毫任上鍖鎚也參同契曰搗和并合研無令赤色鮮固塞示際會務圖白至堅注曰黃銀雖然堅結然未伏火宜入神室內如法固濟令密將於灰池中養之七日入坩堝消不折分毫任上鍖鎚也第七轉變黃銀成赤鉛金取前者淺色黃銀入坩堝消鎔之令作鋋子打修作薄葉厚如半分許扳然後取𥐻砂二兩白鹽一升以水二斗合和用浸黃銀薄片可經二七日滿取出向鍖鎚上試打看如微帶脆未禁鍖鎚打之時則用羚羊角揩磨之其法先燒黃銀扇令赤用羚羊角來去揩之其銀扇片若冷時須臾火燒之凖前法更揩磨之堪上鍖鎚為限總須打修作葉子令薄似紙看其多少以打金葉為度則别取𥐻砂二兩白鹽一升赤土五升胡桐律一兩巳上藥四味相和搗研為末和鳥牛糞拌搜之如泥相次用重重襯金葉子重重疊之以盡為以上金純赤為度鉛金參同契曰金來歸性度蓋覆如法火周圍燒之如是可經十餘日初乃得稱還丹注曰言飛錬赤金稍得相似本於朱砂之色名曰還丹第八轉變赤鉛金成金粉取前件燒成金葉一兩則用朱汞一兩餘藥金皆須准此合和其水銀自食金葉子如泥相似總須攤之如指面許然後一片布之爐中方乃於爐內先布鹽花二兩硝石二兩胡桐律一兩巳上諸藥皆細研如粉用重重隔金葉子為限如法固濟之須令牢密專候爐乾則以文火飛之三日夜訖候待爐子令細第九轉造玄明粉法取朴硝二兩白鹽一兩一味相和煎之如鹽花相似此名玄明粉也待臨用時即用水浸煎使此物不堪久停凡經二七日以上即便氣歇不堪使也所煮銀砂但續玄明粉水煮之令滿二七日候銀砂體色堅硬如石為度如未滿二七曰堅硬者此是硝石氣透盡也更不必二七日夜為限有時三兩日夜硬如石此是著火急硝石氣出盡即不用玄明粉水煮亦得中有煮二七日巳來如退得硝石氣出盡方始得堅硬其硝難退盡緣硝石能化金石為水所以難退盡也若不著則諸石等難退盡也著少許水銀雖硬稍須以意候之太上衛靈神化九轉丹砂法
